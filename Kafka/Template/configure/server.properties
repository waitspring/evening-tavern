#
# 文件位置: /etc/kafka/server.properties
#


# =====================================================================================================================
# 监听/ 注册配置
# =====================================================================================================================
# 基于主机的实际节点调整 ID 编号, 否则报错:
# org.apache.zookeeper.KeeperException$NodeExistsException: KeeperErrorCode = NodeExists
broker.id=0
# 节点禁止在配置缺失的条件下, 自动生成一个 ID 编号
broker.id.generation.enable=false

# 节点注册到相应的 ZooKeeper 节点
zookeeper.connect=zookeeper-0.season.com:2181,zookeeper-1.season.com:2181,zookeeper-2.season.com:2181/kafka
# 节点使用 SSL 注册到相应的 ZooKeeper 节点
# zookeeper.ssl.client.enable=true
# 节点使用 SSL 加密注册连接需要使用的对象类型
# zookeeper.clientCnxnSocket=org.apache.zookeeper.ClientCnxnSocketNetty
# 节点使用 ACL 操作注册中心的数据节点 (上游 ZooKeeper 开启 SASL 认证)
# zookeeper.set.acl=true

listener.security.protocol.map=CONTROLLER:PLAINTEXT,\
                               PLAINTEXT:PLAINTEXT,\
                               SSL:SSL,\
                               SASL_PLAINTEXT:SASL_PLAINTEXT,\
                               SASL_SSL:SASL_SSL

# 配置本地监听
# 配置项 advertised.listeners 禁止使用 0.0.0.0 作为监听地址
advertised.listeners=PLAINTEXT://kafka-0.season.com:9092
# 配置项 listeners 如果使用 0.0.0.0 作为监听地址, 则必须显示指定 advertised.listeners 配置项的值
listeners=PLAINTEXT://0.0.0.0:9092

# SSL 证书配套参数
# 同时支持内网通信使用的明文协议/ 外网通信使用的加密协议
# advertised.listeners=PLAINTEXT://kafka-0.season.com:9092,SSL://kafka-0.season.com:9192
# listeners=PLAINTEXT://0.0.0.0:9092,SSL://0.0.0.0:9192
# 集群内部通信使用明文数据
# inter.broker.listener.name=PLAINTEXT

# SASL 认证配套参数
# 同时支持内网通信使用的明文协议/ 外网通信使用的加密协议, 附带用户认证要求
# advertised.listeners=SASL_PLAINTEXT://kafka-0.season.com:9092,SASL_SSL://kafka-0.season.com:9192
# listeners=SASL_PLAINTEXT://0.0.0.0:9092,SASL_SSL://0.0.0.0:9192
# 集群内部通信使用明文数据, 附带用户认证要求
# security.inter.broker.protocol=SASL_PLAINTEXT


# =====================================================================================================================
# SSL 证书配置部分
# =====================================================================================================================
# 配置密钥库参数
# 配置密钥库使用的数据文件
# ssl.keystore.location=/etc/kafka/kafka.keystore.p12
# 配置密钥库使用的读写密码
# ssl.keystore.password=season_4U
# 明确密钥库使用的数据类型
# ssl.keystore.type=PKCS12

# 配置信任库参数
# 配置信任库使用的数据文件
# ssl.truststore.location=/etc/kafka/kafka.truststore.jks
# 配置信任库使用的读写密码
# ssl.truststore.password=season_4U
# 明确信任库使用的数据类型
# ssl.truststore.type=JKS

# 配置 SSL 证书通用参数
# ssl.enabled.protocols=TLSv1.2
# ssl.endpoint.identification.algorithm=HTTPS
# ssl.client.auth=none


# =====================================================================================================================
# SASL 认证配置部分
# =====================================================================================================================
# Kafka 集群交换用户认证信息时能够使用的通信协议有 PLAIN (明文), SCRAM-SHA-256 (256 位盐值), SCRAM-SHA-512 (512 位盐值)
# sasl.enabled.mechanism=PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
# Kafka 集群内部使用明文协议交换用户认证信息
# sasl.mechanism.inter.broker.protocol=PLAIN
# Kafka 集群指定管理员用户列表
# super.users=User:admin


# =====================================================================================================================
# 数据配置部分
# =====================================================================================================================
# 节点使用 /var/kafka/data 目录寄存业务数据
log.dir=/var/kafka/data
# 节点禁止 ISR 以外的同步副本参与读写副本选举
unclean.leader.election.enable=false
# 节点禁止自动创建主题, 使得生产环境尽可能避免脏数据
auto.create.topics.enable=false
# 节点启用读写副本的自动平衡机制, 使得读写副本不会过度集中到当前节点
auto.leader.rebalance.enable=true
# 节点禁止使用 bin/kafka-topics.sh 工具删除主题, 使得生产环境尽可能保护业务数据
# org.apache.kafka.common.errors.TopicDeletionDisabledException: Topic deletion is disabled
delete.topic.enable=false
# 节点自动创建主题时, 为主题配置 3 个分区
num.partitions=3
# 节点自动创建的主题, 其分区有 3 份副本
default.replication.factor=3
# 节点为偏移量主题创建 3 个分区
offsets.topic.num.partitions=3
# 节点为偏移量主题的每个分区创建 3 份副本
offsets.topic.replication.factor=3
# 按批次读取消息时, 每个批次的最大消息体积为 100MiB
fetch.max.bytes=104857600
# 节点寄存 10 GB 容量大小的数据
log.retention.bytes=10485760000
# 节点寄存的数据保留 168 小时 (7 自然天) 的生命周期
log.retention.hours=168
