#######################################################################################################################
#
# 文件位置: /etc/zookeeper/zoo.cfg
#


# =====================================================================================================================
# 基础配置
# =====================================================================================================================
# 设置每个时间单元为 1000 毫秒 (1 秒钟)
tickTime=1000
# 设置主从实例之间同步数据的时间长度为 10 个时间单元 (10 秒钟)
initLimit=10
# 设置主从实例间心跳检测的回执时间长度为 5 个时间单元 (5 秒钟)
syncLimit=5
# 设置实例的数据存储目录 (存储实例的数据快照文件/ myid 文件)
dataDir=/var/zookeeper/data
# 设置实例的事务日志文件存储目录
dataLogDir=/var/zookeeper/blog
# 设置实例在自动清理数据快照文件时, 仅保存最近 3 份数据快照文件
autopurge.snapRetainCount=3
# 设置实例每间隔 1 小时自动清理一次数据快照文件
autopurge.purgeInterval=1
# 设置实例的业务监听端口
clientPort=2181
# 设置实例的业务连接上限
maxClientCnxns=9999
# 设置实例的 REST API 管理监听端口
admin.serverPort=8080
# 关闭实例的 REST API 管理端口
admin.enableServer=false
# 设置实例的可执行四字命令
# 4lw.commands.whitlist=*


# =====================================================================================================================
# 集群配置
# =====================================================================================================================
# server.0=zookeeper-0.season.com:2888:3888
# 0: 实例的 ID 编号
# zookeeper-0.season.com: 实例的主机地址
# 2888: 实例间的数据通信端口
# 3888: 实例间的选举通信端口
server.0=zookeeper-0.season.com:2888:3888
server.1=zookeeper-1.season.com:2888:3888
server.2=zookeeper-2.season.com:2888:3888


# =====================================================================================================================
# 安全配置
# =====================================================================================================================
# 设置实例的 SSL 监听端口
# secureClientPort=2281
# 设置实例的 SSL 监听端口需要使用的对象类型
# serverCnxnFactory=org.apache.zookeeper.server.NettyServerCnxnFactory
# 设置软件使用密钥库文件
# ssl.keyStore.location=/etc/zookeeper/zookeeper.keystore.p12
# 设置软件使用密钥库口令
# ssl.keyStore.password=season_4U
# 设置软件密钥库数据类型
# ssl.keyStore.type=PKCS12
# 设置软件使用信任库文件
# ssl.trustStore.location=/etc/zookeeper/zookeeper.truststore.jks
# 设置软件使用信任库口令
# ssl.trustStore.password=season_4U
# 设置软件信任库数据类型
# ssl.trustStore.type=JKS
# 下游客户端单向验证上游服务端的 SSL 证书
# ssl.clientAuth=none

# 开启 SASL 特性
# requireClientAuthScheme=sasl
# 使用 SASLAuthenticationProvider 类对象验证用户身份
# 0: 实例的 ID 编号
# authProvider.0=org.apache.zookeeper.server.auth.SASLAuthenticationProvider
# 整个用户会话的生命周期内, 逐条命令验证用户身份
# sessionRequireClientSASLAuth=true
# 配置 SASL 管理员
# superUser=admin

